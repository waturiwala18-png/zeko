<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شات أبو قرمط</title>
  <style>
    body { font-family: Tahoma, sans-serif; background: #111; color: #eee; margin: 0; display: flex; justify-content: center; }
   .chat { width: 100%; max-width: 600px; height: 100vh; display: flex; flex-direction: column; }
   .messages { flex: 1; padding: 20px; overflow-y: auto; }
   .msg { margin: 10px 0; padding: 12px; border-radius: 12px; max-width: 80%; line-height: 1.6; }
   .user { background: #2563eb; margin-right: auto; }
   .bot { background: #374151; margin-left: auto; }
   .input-area { display: flex; padding: 10px; background: #1f2937; }
    input { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #374151; color: white; }
    button { margin-right: 10px; padding: 12px 20px; border: none; background: #2563eb; color: white; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="chat">
    <div class="messages" id="messages">
      <div class="msg bot">أهلاً يا زعيم، أنا شغال بـ Gemini ببلاش. قول اللي في نفسك 😎</div>
    </div>
    <div class="input-area">
      <input id="input" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') send()">
      <button onclick="send()">إرسال</button>
    </div>
  </div>

<script>
async function send() {
  const input = document.getElementById('input');
  const messages = document.getElementById('messages');
  const text = input.value.trim();
  if (!text) return;

  messages.innerHTML += `<div class="msg user">${text}</div>`;
  input.value = '';
  messages.scrollTop = messages.scrollHeight;

  messages.innerHTML += `<div class="msg bot" id="loading">بفكر...</div>`;
  messages.scrollTop = messages.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();

    document.getElementById('loading').remove();
    messages.innerHTML += `<div class="msg bot">${data.reply}</div>`;
    messages.scrollTop = messages.scrollHeight;
  } catch (e) {
    document.getElementById('loading').remove();
    messages.innerHTML += `<div class="msg bot">الموقع واقع يا زعيم، جرب تاني</div>`;
  }
}
</script>
</body>
</html>
